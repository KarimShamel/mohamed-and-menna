<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed & Menna's Engagement</title>
    <!-- Google Fonts for Elegant Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4af37; /* Elegant Gold */
            --bg-color: #faf6f0;      /* Soft Warm White */
            --text-dark: #333333;
            --text-light: #777777;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- Envelope / Cover Screen --- */
        #cover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f5f0e6 0%, #e6dcce 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
            text-align: center;
            padding: 20px;
        }

        #cover-screen.hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .cover-title {
            font-family: 'Alex Brush', cursive;
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .cover-subtitle {
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 40px;
        }

        .open-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
        }

        /* --- Main Content Card --- */
        .main-container {
            max-width: 500px;
            width: 90%;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease 0.5s;
        }

        body.loaded .main-container {
            opacity: 1;
            transform: translateY(0);
        }

        .couple-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 25px;
            border: 4px solid var(--primary-color);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .main-title {
            font-family: 'Alex Brush', cursive;
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .divider {
            width: 60px;
            height: 1px;
            background-color: var(--primary-color);
            margin: 20px auto;
        }

        .details-section {
            margin: 25px 0;
        }

        .detail-item {
            font-size: 1.1rem;
            margin: 12px 0;
            font-weight: 400;
        }

        .detail-item strong {
            font-weight: 600;
            color: var(--text-dark);
        }

        .maps-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #white;
            color: var(--text-dark);
            border: 2px solid var(--primary-color);
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .maps-btn:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        .maps-btn svg {
            fill: currentColor;
            width: 18px;
            height: 18px;
        }

        /* Ambient background shapes for depth */
        .bg-circle {
            position: absolute;
            background: rgba(212, 175, 55, 0.03);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <!-- Background Elements -->
    <div class="bg-circle" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="bg-circle" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>

    <!-- Hidden Audio Element -->
    <!-- Supported formats: mp3, wav, ogg. Ensure mo-song.mp3 is in the same directory -->
    <audio id="bg-music" loop>
        <source src="mo-song.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Cover / Splash Screen -->
    <div id="cover-screen">
        <h1 class="cover-title">Mohamed & Menna</h1>
        <p class="cover-subtitle">Are getting engaged</p>
        <button class="open-btn" onclick="openInvitation()">Open Invitation</button>
    </div>

    <!-- Main Invitation Content -->
    <div class="main-container">
        <!-- Replace 'couple.jpg' with the path to their photo -->
        <img src="couple.jpg" alt="Mohamed and Menna" class="couple-photo" onerror="this.src='https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?q=80&w=600&auto=format&fit=crop'">
        
        <h2 class="main-title">Mohamed & Menna</h2>
        <p class="tagline">Save The Date</p>
        
        <div class="divider"></div>
        
        <div class="details-section">
            <p class="detail-item">Join us for our engagement celebration on</p>
            <p class="detail-item"><strong>Friday, July 31, 2026</strong></p>
            <p class="detail-item">at <strong>7:00 PM</strong></p>
            
            <div class="divider"></div>
            
            <p class="detail-item">Location</p>
            <p class="detail-item"><strong>Al Toras</strong></p>
        </div>

        <!-- Google Maps Button -->
        <a href="https://maps.app.goo.gl/BCjAttkraE9rWby36" target="_blank" class="maps-btn">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
            View Location on Maps
        </a>
    </div>

    <script>
        function openInvitation() {
            // Hide the cover screen
            document.getElementById('cover-screen').classList.add('hidden');
            
            // Trigger the entry animations for the main content
            document.body.classList.add('loaded');
            
            // Play the background music
            const music = document.getElementById('bg-music');
            music.play().catch(error => {
                console.log("Audio autoplay was prevented by browser security policies. Interaction required.", error);
            });
        }
    </script>
</body>
</html>
